# mcp.precis.finance — open precis-mcp ingress (host nginx + certbot).
#
# Fronts the open bundle's localhost-published services with TLS, mirroring the
# commercial demo vhost's OAuth routing — the open subset, no SPA / no /api:
#   /auth/* (+ DCR + AS-metadata path-insertion form) → Keycloak  127.0.0.1:8080
#   everything else (/mcp, /.well-known/oauth-protected-resource,
#     /authorize /token /register, /health)           → app_open  127.0.0.1:8769
#
# Self-contained: no shared snippets. certbot (--nginx) obtains/renews the
# cert below.

# Anonymous DCR stays open by design (MCP clients self-register; registration
# grants no data access — the provisioning gate does), but rate-limit it so it
# can't be used for unbounded client-row creation in Keycloak.
limit_req_zone $binary_remote_addr zone=precis_dcr:10m rate=5r/m;

server {
    listen 80;
    server_name mcp.precis.finance;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.precis.finance;

    ssl_certificate     /etc/letsencrypt/live/mcp.precis.finance/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.precis.finance/privkey.pem;

    # ── OAuth AS-metadata, path-insertion form (RFC 8414) → Keycloak ──
    # Strict clients probe /.well-known/<type>/auth/realms/precis; Keycloak
    # serves it at /auth/realms/precis/.well-known/<type>.
    location ~ ^/\.well-known/(oauth-authorization-server|openid-configuration)/(.+)$ {
        rewrite ^/\.well-known/([^/]+)/(.+)$ /$2/.well-known/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── DCR registration → Keycloak (rate-limited; zone above) ──
    location /auth/realms/precis/clients-registrations/ {
        limit_req zone=precis_dcr burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Keycloak admin console + Admin REST API — blocked at the edge ──
    # Not needed by MCP clients or the realm reconcile (which runs
    # container-to-container). Administer Keycloak via an SSH tunnel to
    # 127.0.0.1:8080, or replace `deny all` with allow/deny rules for a
    # trusted range.
    location /auth/admin/ {
        deny all;
    }

    # ── Keycloak at /auth/ ──
    location /auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ── Everything else → open MCP server (app_open) ──
    location / {
        proxy_pass http://127.0.0.1:8769;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/mcp.precis.finance.access.log;
    error_log  /var/log/nginx/mcp.precis.finance.error.log;
}
