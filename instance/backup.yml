# Declarative backup config — the single source of truth for the backup
# subsystem. The ClickHouse backup-disk XML drop-in is GENERATED from this
# file by `precis-mcp-admin backup init`; never hand-edit the rendered XML.
#
# This file holds credential REFERENCES (env-var prefixes), never values.
# See operations/backups.md for the s3 variant and the
# full procedure.
mode: dump                      # dump | pitr (pitr not yet supported)

destination:
  type: local
  path: /backups                # the shared compose volume; mounted identically
                                # in the clickhouse and backup-scheduler services

schedule:
  cron: "30 2 * * *"            # nightly full

retention:
  postgres:   { keep: 7 }
  clickhouse: { keep: 7 }
  instance:   { keep: 7 }

scope:
  postgres: managed
  clickhouse: managed
  files: external               # no USER_DATA_DIR in the open bundle; skipped

expect_worm: false
