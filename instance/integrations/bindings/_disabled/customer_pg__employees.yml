# customer_pg × employees — HR master data binding.
#
# Snapshot binding: every push is a full replacement of the employee
# master. Reads `hr.employees` with no period filter; dbt transform keeps
# one row per employee_id via `snapshot_latest_by`. Live landing table is
# unpartitioned; swap stage is `EXCHANGE TABLES`.

id: customer_pg__employees
source: customer_pg
dataset: employees
kind: snapshot
schedule:
  mode: push
  push_auth:
    role: ingest_admin
    binding_token_ref: customer_pg_token
extract:
  source_table: "hr.employees"
scenario: ACTUALS
natural_key: employee_id
